name: Build macOS app

# Build the macOS .dmg on a real macOS runner (so get-windows pulls its
# darwin native binary and electron-builder produces a native disk image).
# macos-latest runners are Apple Silicon (arm64); npm only fetches the
# current arch's get-windows prebuild, so we build an arm64 dmg.
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # get-windows is an N-API prebuild; install fetches the darwin-arm64 binary.
        run: npm install

      - name: Verify get-windows macOS binary is present
        run: |
          found=$(find node_modules/get-windows/lib/binding -name '*.node' | grep -i darwin || true)
          echo "darwin binary: ${found:-NONE FOUND}"
          test -n "$found"

      - name: Build app (main + UI)
        run: npm run build

      - name: Package macOS disk image
        # npmRebuild:false in package.json keeps electron-builder from recompiling
        # the N-API prebuild. CSC_IDENTITY_AUTODISCOVERY=false skips real (Developer
        # ID) code signing so builds succeed without an Apple Developer certificate.
        # The afterPack hook (build/afterPack.cjs) then ad-hoc signs the .app so
        # Apple Silicon macOS doesn't reject it as "damaged".
        env:
          CSC_IDENTITY_AUTODISCOVERY: false
        run: npx electron-builder --mac dmg --arm64 --publish never

      # Download from the run's "Artifacts" section.
      - name: Upload disk image artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeTracker-macOS-Installer
          path: dist/*.dmg
          if-no-files-found: error
