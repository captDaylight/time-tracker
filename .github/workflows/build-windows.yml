name: Build Windows installer

# Build the Windows .exe on a real Windows runner (so get-windows pulls its
# Windows native binary and the NSIS installer is produced natively).
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # get-windows is an N-API prebuild; install fetches the win32-x64 binary.
        run: npm install

      - name: Verify get-windows Windows binary is present
        shell: bash
        run: |
          found=$(find node_modules/get-windows/lib/binding -name '*.node' | grep -i win32 || true)
          echo "win32 binary: ${found:-NONE FOUND}"
          test -n "$found"

      - name: Build app (main + UI)
        run: npm run build

      - name: Package Windows installer
        # npmRebuild:false in package.json keeps electron-builder from recompiling
        # the N-API prebuild (which fails on Python 3.12 with no distutils).
        run: npx electron-builder --win nsis --publish never

      # Download from the run's "Artifacts" section.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeTracker-Windows-Installer
          path: dist/*.exe
          if-no-files-found: error
